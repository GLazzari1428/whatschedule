name: Build Android APK

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Capacitor dependencies
        run: npm install @capacitor/cli@latest @capacitor/core@latest @capacitor/android@latest
      
      - name: Initialize Capacitor (if needed)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
      
      - name: Sync Capacitor
        run: npx cap sync
      
      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon
      
      - name: Get version info
        id: version
        run: |
          echo "VERSION=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      
      - name: Rename APK files
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          COMMIT="${{ steps.version.outputs.COMMIT_SHA }}"
          
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/WhatScheduler-debug-${VERSION}-${COMMIT}.apk
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: whatscheduler-debug-${{ steps.version.outputs.VERSION }}
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

