<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="./images/favicon.ico">
    <title>Login – WhatsApp Scheduler</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0b141a;
            color: #e9edef;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #1e2a2f;
            border-radius: 12px;
            padding: 36px 30px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
        }
        .logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo .icon { font-size: 48px; }
        h1 { color: #00a884; font-size: 22px; margin-top: 8px; }
        p.sub { color: #8696a0; font-size: 13px; margin-top: 4px; }
        .form-group { margin: 20px 0; }
        label { display: block; font-size: 13px; color: #8696a0; margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: .5px; }
        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            background: #2a3942;
            border: 2px solid #374248;
            border-radius: 10px;
            color: #e9edef;
            font-size: 15px;
            transition: border-color .2s;
        }
        input[type="password"]:focus { outline: none; border-color: #00a884; }
        .error {
            background: #3d1a1a;
            color: #ff6b6b;
            border: 1px solid #d32f2f;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }
        .error.show { display: block; }
        button {
            width: 100%;
            background: #00a884;
            color: #111b21;
            border: none;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            margin-top: 20px;
            transition: background .2s;
        }
        button:hover { background: #06cf9c; }
        button:disabled { background: #374248; color: #8696a0; cursor: not-allowed; }
        .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid #8696a0;
            border-top-color: #00a884;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <div class="icon">🔒</div>
        <h1>WhatsApp Scheduler</h1>
        <p class="sub">Enter your password to continue</p>
    </div>
    <form id="loginForm">
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password" autofocus required>
        </div>
        <div id="errMsg" class="error"></div>
        <button type="submit" id="submitBtn">Unlock</button>
    </form>
</div>

<script>
    const SERVER_KEY = 'whatscheduler_server_url';
    const AUTH_KEY   = 'whatscheduler_auth_token';

    const BASE_URL = localStorage.getItem(SERVER_KEY) || '';
    if (!BASE_URL) { window.location.href = 'config.html'; }

    const form      = document.getElementById('loginForm');
    const pwInput   = document.getElementById('password');
    const submitBtn = document.getElementById('submitBtn');
    const errMsg    = document.getElementById('errMsg');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const pw = pwInput.value.trim();
        if (!pw) return;

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner"></span>Checking...';
        errMsg.classList.remove('show');

        try {
            const res = await fetch(`${BASE_URL}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pw })
            });
            const data = await res.json();
            if (res.ok && data.token) {
                localStorage.setItem(AUTH_KEY, data.token);
                window.location.href = 'index.html';
            } else {
                throw new Error(data.error || 'Invalid password');
            }
        } catch (err) {
            errMsg.textContent = err.message;
            errMsg.classList.add('show');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Unlock';
        }
    });
</script>
</body>
</html>
